<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - كول واتهنى</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="admin-panel active" style="padding-top:calc(var(--header-height) + 20px);">
        <button class="back-btn" onclick="window.location.href='../index.html'">
            <i class="fas fa-arrow-right"></i> العودة للرئيسية
        </button>
        <h2 class="section-title">⚙️ لوحة التحكم</h2>
        
        <div class="admin-card">
            <h3>📊 إحصائيات</h3>
            <div id="adminStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;"></div>
        </div>
        
        <div class="admin-card">
            <h3>➕ إضافة مطعم جديد</h3>
            <form class="admin-form" id="addRestaurantForm" onsubmit="addNewRestaurant(event)">
                <input type="text" id="newRestName" placeholder="اسم المطعم" required>
                <input type="text" id="newRestCuisine" placeholder="نوع المطبخ" required>
                <input type="text" id="newRestProvince" placeholder="المحافظة" list="provinceList" required>
                <datalist id="provinceList">
                    <option value="دمشق"><option value="ريف دمشق"><option value="حلب"><option value="حمص">
                    <option value="حماة"><option value="اللاذقية"><option value="طرطوس"><option value="دير الزور">
                    <option value="الحسكة"><option value="الرقة"><option value="إدلب"><option value="السويداء">
                    <option value="درعا"><option value="القنيطرة">
                </datalist>
                <input type="number" id="newRestRating" placeholder="التقييم (0-5)" min="0" max="5" step="0.1" required>
                <input type="text" id="newRestPriceRange" placeholder="نطاق السعر ($-$$$$)" required>
                <input type="text" id="newRestAddress" placeholder="العنوان" required>
                <input type="text" id="newRestPhone" placeholder="رقم الهاتف">
                <input type="text" id="newRestHours" placeholder="ساعات العمل (مثال: 10:00 - 22:00)">
                <textarea id="newRestDesc" placeholder="وصف المطعم"></textarea>
                <input type="text" id="newRestImage" placeholder="رابط الصورة" value="https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg">
                <button type="submit" class="admin-submit">➕ إضافة المطعم</button>
            </form>
        </div>
        
        <div class="admin-card">
            <h3>📝 إدارة التقييمات</h3>
            <div id="adminReviewsList" class="admin-list"></div>
        </div>
    </div>
    
    <script src="../js/data.js"></script>
    <script src="../js/utils.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateAdminStats();
            renderAdminReviews();
        });
        
        function updateAdminStats() {
            const cached = JSON.parse(localStorage.getItem('cachedRestaurants') || '{}');
            let total = 0, totalReviews = 0;
            for (const p in cached) {
                total += cached[p].length;
                cached[p].forEach(r => {
                    if (r.reviews) totalReviews += r.reviews.length;
                });
            }
            document.getElementById('adminStats').innerHTML = `
                <div class="stat-item"><span class="stat-number">${total}</span><span class="stat-label">🍽️ مطعم</span></div>
                <div class="stat-item"><span class="stat-number">${totalReviews}</span><span class="stat-label">⭐ تقييم</span></div>
                <div class="stat-item"><span class="stat-number">${Object.keys(cached).length}</span><span class="stat-label">📍 محافظة</span></div>
            `;
        }
        
        function renderAdminReviews() {
            const container = document.getElementById('adminReviewsList');
            const cached = JSON.parse(localStorage.getItem('cachedRestaurants') || '{}');
            let allReviews = [];
            for (const p in cached) {
                cached[p].forEach(r => {
                    if (r.reviews && r.reviews.length > 0) {
                        r.reviews.forEach((rev, idx) => {
                            allReviews.push({
                                restaurant: r.name,
                                province: p,
                                review: rev,
                                index: idx,
                                restId: r.id
                            });
                        });
                    }
                });
            }
            if (allReviews.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary);font-size:0.75rem;">لا توجد تقييمات</p>';
                return;
            }
            container.innerHTML = allReviews.map((item, i) => `
                <div class="admin-list-item">
                    <span><b>${item.restaurant}</b> (${item.province}) - ${'★'.repeat(item.review.rating)}${'☆'.repeat(5-item.review.rating)}</span>
                    <button class="delete-btn" onclick="deleteReview('${item.province}','${item.restId}',${item.index})">حذف</button>
                </div>
            `).join('');
        }
        
        function deleteReview(province, restId, index) {
            const cached = JSON.parse(localStorage.getItem('cachedRestaurants') || '{}');
            const rest = cached[province]?.find(r => r.id === restId);
            if (!rest || !rest.reviews || !rest.reviews[index]) return;
            rest.reviews.splice(index, 1);
            localStorage.setItem('cachedRestaurants', JSON.stringify(cached));
            renderAdminReviews();
            alert('تم حذف التقييم');
        }
        
        function addNewRestaurant(event) {
            event.preventDefault();
            const name = document.getElementById('newRestName').value.trim();
            const cuisine = document.getElementById('newRestCuisine').value.trim();
            const province = document.getElementById('newRestProvince').value.trim();
            const rating = parseFloat(document.getElementById('newRestRating').value);
            const priceRange = document.getElementById('newRestPriceRange').value.trim();
            const address = document.getElementById('newRestAddress').value.trim();
            const phone = document.getElementById('newRestPhone').value.trim();
            const hours = document.getElementById('newRestHours').value.trim();
            const desc = document.getElementById('newRestDesc').value.trim();
            const image = document.getElementById('newRestImage').value.trim() || 'https://images.pexels.com/photos/262978/pexels-photo-262978.jpeg';
            
            if (!name || !cuisine || !province || isNaN(rating) || !priceRange || !address) {
                alert('الرجاء ملء جميع الحقول المطلوبة');
                return;
            }
            
            const cached = JSON.parse(localStorage.getItem('cachedRestaurants') || '{}');
            if (!cached[province]) cached[province] = [];
            
            const newRest = {
                id: `admin_${Date.now()}`,
                name, cuisine, rating: Math.min(5, Math.max(0, rating)), priceRange,
                description: desc || `مطعم ${name} في ${province}`,
                address, phone, image,
                openingHours: hours || '10:00 صباحاً - 11:00 مساءً',
                reviews: [],
                views: 0
            };
            cached[province].unshift(newRest);
            localStorage.setItem('cachedRestaurants', JSON.stringify(cached));
            document.getElementById('addRestaurantForm').reset();
            updateAdminStats();
            alert(`✅ تم إضافة مطعم ${name} بنجاح`);
        }
    </script>
</body>
</html>
