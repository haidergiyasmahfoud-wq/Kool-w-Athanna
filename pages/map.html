<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة المطاعم - كول واتهنى</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="city-page active" style="padding-top:calc(var(--header-height) + 20px);">
        <button class="back-btn" onclick="window.location.href='../index.html'">
            <i class="fas fa-arrow-right"></i> العودة للرئيسية
        </button>
        <div class="city-header">
            <h2>🗺️ خريطة المطاعم</h2>
            <p>جميع المطاعم موزعة على المحافظات السورية</p>
        </div>
        <div id="mapContainer" style="height:500px;border-radius:var(--radius);overflow:hidden;margin:10px 0;border:1px solid var(--border);"></div>
        <div class="map-filters">
            <select id="mapProvinceFilter" onchange="filterMapByProvince(this.value)">
                <option value="all">جميع المحافظات</option>
                <!-- يتم تعبئتها عبر JavaScript -->
            </select>
        </div>
    </div>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="../js/data.js"></script>
    <script>
        let map = null;
        let mapMarkers = [];
        const provinces = ["دمشق", "ريف دمشق", "حلب", "حمص", "حماة", "اللاذقية", "طرطوس", "دير الزور", "الحسكة", "الرقة", "إدلب", "السويداء", "درعا", "القنيطرة"];
        
        document.addEventListener('DOMContentLoaded', () => {
            // تعبئة الفلتر
            const filter = document.getElementById('mapProvinceFilter');
            provinces.forEach(p => {
                const option = document.createElement('option');
                option.value = p;
                option.textContent = p;
                filter.appendChild(option);
            });
            
            initMap();
        });
        
        function initMap() {
            const container = document.getElementById('mapContainer');
            if (typeof L === 'undefined') {
                container.innerHTML = '<p style="text-align:center;padding:50px;">تعذر تحميل الخريطة</p>';
                return;
            }
            
            map = L.map('mapContainer').setView([34.8, 37.5], 7);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);
            
            // إضافة نقاط للمطاعم من البيانات المخزنة
            const cached = JSON.parse(localStorage.getItem('cachedRestaurants') || '{}');
            const allData = [];
            for (const p in cached) {
                cached[p].forEach(r => {
                    if (r.lat && r.lng) {
                        allData.push({...r, province: p});
                    }
                });
            }
            
            allData.forEach(r => {
                const marker = L.marker([r.lat, r.lng]).addTo(map);
                marker.bindPopup(`
                    <b>${r.name}</b><br>
                    ${r.cuisine}<br>
                    ⭐ ${r.rating}/5<br>
                    📍 ${r.province}<br>
                    <button onclick="window.location.href='../index.html?restaurant=${r.province}|${r.id}'" style="background:#E85D04;color:white;border:none;padding:4px 12px;border-radius:20px;cursor:pointer;">عرض التفاصيل</button>
                `);
                marker._restaurant = { province: r.province, id: r.id };
                mapMarkers.push(marker);
            });
            
            map.invalidateSize();
        }
        
        function filterMapByProvince(province) {
            if (!map || !mapMarkers.length) return;
            mapMarkers.forEach(marker => {
                const rest = marker._restaurant;
                if (!rest) return;
                if (province === 'all' || rest.province === province) {
                    marker.addTo(map);
                } else {
                    map.removeLayer(marker);
                }
            });
        }
    </script>
</body>
</html>
